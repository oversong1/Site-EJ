server {
    listen 80;
    server_name localhost;

    root /var/www/app/public;
    index index.php;

    # ── Uploads do Laravel (storage link)
    location ^~ /storage/ {
        alias /var/www/storage/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Assets estáticos (CSS/JS/imagens) — servidos direto do Laravel public/
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|webp)$ {
        root /var/www/app/public;
        expires 7d;
        access_log off;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ── Tudo passa pelo Laravel (Blade + API)
    location / {
        try_files $uri $uri/ @laravel;
    }

    location @laravel {
        fastcgi_pass laravel:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/app/public/index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        include fastcgi_params;
        fastcgi_read_timeout 120;
    }

    location ~ \.php$ {
        fastcgi_pass laravel:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/app/public$fastcgi_script_name;
        fastcgi_param REQUEST_URI     $request_uri;
        include fastcgi_params;
        fastcgi_read_timeout 120;
    }

    # Segurança
    location ~ /\.ht  { deny all; }
    location ~ /\.env { deny all; }

    # Logs
    access_log  /var/log/nginx/ej_access.log;
    error_log   /var/log/nginx/ej_error.log;

    client_max_body_size 10M;
}
