server {
    listen 80;
    server_name localhost;

    # ── Imagens / uploads do Laravel (storage link)
    location ^~ /storage/ {
        alias /var/www/storage/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── API Laravel — todas as rotas /api/*
    location ^~ /api {
        root /var/www/app/public;
        index index.php;
        try_files $uri $uri/ @laravel_api;

        location ~ \.php$ {
            fastcgi_pass laravel:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME /var/www/app/public$fastcgi_script_name;
            fastcgi_param REQUEST_URI     $request_uri;
            include fastcgi_params;
            fastcgi_read_timeout 120;
        }
    }

    location @laravel_api {
        fastcgi_pass laravel:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/app/public/index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        include fastcgi_params;
        fastcgi_read_timeout 120;
    }

    # ── Frontend estático (HTML/CSS/JS)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
    }

    # Cache de assets estáticos
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        root /usr/share/nginx/html;
        expires 7d;
        access_log off;
        add_header Cache-Control "public";
    }

    # Segurança
    location ~ /\.ht { deny all; }
    location ~ /\.env { deny all; }

    # Logs
    access_log  /var/log/nginx/ej_access.log;
    error_log   /var/log/nginx/ej_error.log;

    # Upload limit
    client_max_body_size 10M;
}
